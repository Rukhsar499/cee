<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>.compare-container {
    position: relative;
    width: 100%;
    max-width: 800px;
    overflow: hidden;
}

.compare-img {
    position: absolute;
    width: 100%;
    height: 100%;
}

.compare-img img {
    width: 100%;
    display: block;
}

/* AFTER image on top */
.compare-img.after {
    width: 50%;
    overflow: hidden;
}

/* Labels */
.label {
    position: absolute;
    top: 10px;
    padding: 5px 15px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-weight: bold;
    border-radius: 20px;
}

.before-label {
    right: 10px;
}

.after-label {
    left: 10px;
}

/* Slider line */
.slider-line {
    position: absolute;
    top: 0;
    left: 50%;
    width: 3px;
    height: 100%;
    background: #fff;
    cursor: ew-resize;
    z-index: 10;
}

.slider-line .circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 25px;
    height: 25px;
    background: #fff;
    border-radius: 50%;
    border: 2px solid #333;
}
</style>
</head>
<body>
    <div class="compare-container">
    <div class="compare-img before">
        <img src="before.jpg" alt="Before">
        <span class="label before-label">Before</span>
    </div>

    <div class="compare-img after">
        <img src="after.jpg" alt="After">
        <span class="label after-label">After</span>
    </div>

    <div class="slider-line" id="slider">
        <span class="circle"></span>
    </div>
</div>
<script>
const slider = document.getElementById("slider");
const container = document.querySelector(".compare-container");
const afterImg = document.querySelector(".compare-img.after");

let isDragging = false;

slider.addEventListener("mousedown", () => isDragging = true);
window.addEventListener("mouseup", () => isDragging = false);

window.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    let rect = container.getBoundingClientRect();
    let offsetX = e.clientX - rect.left;

    if (offsetX < 0) offsetX = 0;
    if (offsetX > rect.width) offsetX = rect.width;

    let percent = (offsetX / rect.width) * 100;

    afterImg.style.width = percent + "%";
    slider.style.left = percent + "%";
});
</script>
</body>

</html>
